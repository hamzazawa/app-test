<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPEC STORE - شحن وبيع حسابات eFootball</title>
    <meta name="description" content="متجر EPEC STORE الأفضل لبيع وشحن حسابات eFootball.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .price-bar button { transition: all 0.2s ease-in-out; }
        .price-bar button.active { background-color: #2563eb; color: white; }
    </style>
</head>
<body class="antialiased">

    <header class="bg-[#1e293b] border-b border-slate-800 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-gamepad text-blue-500 text-2xl"></i>
                <h1 class="text-xl font-black text-white tracking-wider">EPEC STORE</h1>
            </div>
            
            <div class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                <span class="relative flex h-2.5 w-2.5">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                </span>
                <span class="text-xs font-bold text-slate-300"><span id="activeCount">16</span> نشط</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <div class="flex justify-center mb-8">
            <div class="price-bar flex bg-slate-800 rounded-xl overflow-hidden border border-slate-700 w-full max-w-2xl shadow-lg">
                <button class="flex-1 py-3 text-sm font-bold active border-l border-slate-700">الكل</button>
                <button class="flex-1 py-3 text-sm font-bold text-slate-400 hover:bg-slate-700 border-l border-slate-700">أقل من 100</button>
                <button class="flex-1 py-3 text-sm font-bold text-slate-400 hover:bg-slate-700 border-l border-slate-700">100 - 300</button>
                <button class="flex-1 py-3 text-sm font-bold text-slate-400 hover:bg-slate-700">+300 درهم</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="accountsGrid">
            </div>

    </main>

    <script>
        // داتا الحسابات (نفس التي أرسلتها لي)
        const accountsData = {
            "7UaDhCdeyj": { bank_price: "80", inwi_price: "100", img: "https://pbs.twimg.com/media/HFzZwLQWIAAcoRU?format=jpg&name=900x900", title: "كونط بثمن ناقص و عامر فيه شي 250 لاعب" },
            "NDE4rFUoKd": { bank_price: "190", inwi_price: "240", img: "https://pbs.twimg.com/media/HEruJ93bIAAxSMQ?format=jpg&name=900x900", title: "كونط ديال تقصار 100% فيه اقود نسخة ديال مبابي و ريبيري جديد" },
            "S5Ordx0ZtW": { bank_price: "420", inwi_price: "500", img: "https://pbs.twimg.com/media/HE01OH5bsAAZWHn?format=jpg&name=900x900", title: "كونط عامر فيه احسن رأس حربة + أحسن بليتز دفاع" },
            "YcmoBn1QF9": { bank_price: "150", inwi_price: "180", img: "https://pbs.twimg.com/media/HFpUs1jXwAAg8Mx?format=jpg&name=900x900", title: "القناص باتيستوتا و مولر و ديونغ و المدرب" },
            "YpK4Qcy70M": { bank_price: "250", inwi_price: "290", img: "https://pbs.twimg.com/media/HF3Hjp1WYAACIc4?format=jpg&name=900x900", title: "فيه 2 بليتز فيا و لمين يامال و الوسط مقود" },
            "a3qpJjKkcY": { bank_price: "250", inwi_price: "310", img: "https://pbs.twimg.com/media/HFuux_KbYAAjykQ?format=jpg&name=900x900", title: "كونط عامر مدربين فيه صون من أحسن بليتزلات" },
            "acc15": { bank_price: "120", inwi_price: "130", img: "https://files.catbox.moe/3ur4bb.jpg", title: "صحاب بيرلو ها هو" }
            // يمكنك إضافة الباقي بنفس النمط
        };

        const grid = document.getElementById('accountsGrid');
        
        for (const [id, acc] of Object.entries(accountsData)) {
            // تجهيز الرابط لصفحة الدفع الجديدة مع إرسال البيانات
            const checkoutUrl = `checkout.html?id=${id}&title=${encodeURIComponent(acc.title)}&img=${encodeURIComponent(acc.img)}&bank=${acc.bank_price}&inwi=${acc.inwi_price}`;
            
            grid.innerHTML += `
            <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700 hover:border-blue-500 transition duration-300 flex flex-col">
                <img src="${acc.img}" class="w-full h-48 object-cover border-b border-slate-700">
                <div class="p-4 flex-grow flex flex-col justify-between">
                    <h3 class="font-bold text-sm mb-4 text-slate-200">${acc.title}</h3>
                    <div>
                        <div class="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg mb-2">
                            <span class="text-slate-400 text-xs">البنك / كاش بليس:</span>
                            <span class="font-bold text-blue-400 text-sm">${acc.bank_price} MAD</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-900/50 p-2.5 rounded-lg mb-4">
                            <span class="text-slate-400 text-xs">تعبئة إنوي:</span>
                            <span class="font-bold text-purple-400 text-sm">${acc.inwi_price} MAD</span>
                        </div>
                        <a href="${checkoutUrl}" class="block w-full text-center bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg transition text-sm shadow-lg shadow-blue-500/20">
                            شراء الحساب
                        </a>
                    </div>
                </div>
            </div>`;
        }

        // عداد عشوائي للنشطين
        setInterval(() => {
            document.getElementById('activeCount').innerText = Math.floor(Math.random() * (45 - 12 + 1)) + 12;
        }, 6000);
    </script>
</body>
</html>
