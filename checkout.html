<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - EPEC STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        /* تصميم اختيار الدفع التفاعلي */
        .payment-label input:checked + div { 
            border-color: #3b82f6; 
            background-color: rgba(59, 130, 246, 0.1); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }
        .payment-label input:checked + div .check-circle { 
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        .payment-label input:checked + div .check-circle i { opacity: 1; }
        
        /* إخفاء شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <header class="bg-[#1e293b] border-b border-slate-800 py-4 sticky top-0 z-50">
        <div class="container mx-auto px-4 max-w-md flex items-center justify-between">
            <h1 class="text-sm font-black text-white flex items-center gap-2">
                <i class="fa-solid fa-lock text-green-400"></i> إتمام الشراء الآمن
            </h1>
            <a href="index.html" class="text-slate-400 hover:text-white text-xs font-bold transition flex items-center gap-1">
                <i class="fa-solid fa-arrow-right"></i> إلغاء
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-md flex-grow">
        
        <div class="bg-slate-800/80 border border-slate-700 rounded-2xl overflow-hidden mb-8 shadow-lg">
            <div class="relative h-40 w-full bg-slate-900">
                <img id="accImg" src="" alt="Account Image" class="w-full h-full object-cover opacity-90">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
            </div>
            
            <div class="p-4 -mt-6 relative z-10">
                <div class="flex gap-2 mb-3">
                    <span class="bg-blue-900/80 border border-blue-500/50 text-blue-300 text-[10px] font-black px-2 py-1 rounded flex items-center gap-1 shadow-md backdrop-blur-sm">
                        <i class="fa-solid fa-link"></i> KONAMI ID
                    </span>
                    <span class="bg-red-900/80 border border-red-500/50 text-red-300 text-[10px] font-black px-2 py-1 rounded flex items-center gap-1 shadow-md backdrop-blur-sm">
                        <i class="fa-brands fa-google-play"></i> GOOGLE PLAY: NO
                    </span>
                </div>

                <h2 id="accTitle" class="text-sm font-bold text-white leading-relaxed mb-4">جاري التحميل...</h2>
                
                <div class="flex items-center justify-between bg-slate-900/50 rounded-xl p-3 border border-slate-700/50">
                    <div class="text-center w-1/2 border-l border-slate-700">
                        <p class="text-[10px] text-slate-400 mb-0.5">سعر البنك</p>
                        <p id="baseBankPrice" class="font-bold text-sm text-slate-200">0 MAD</p>
                    </div>
                    <div class="text-center w-1/2">
                        <p class="text-[10px] text-slate-400 mb-0.5">سعر التعبئة</p>
                        <p id="baseInwiPrice" class="font-bold text-sm text-slate-200">0 MAD</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="text-sm font-black text-slate-200">اختر طريقة الدفع</h3>
            <span class="text-[10px] text-green-400 font-bold bg-green-900/20 px-2 py-1 rounded border border-green-500/20">تخفيضات حصرية</span>
        </div>
        
        <div class="space-y-3 mb-8">
            
            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="تحويل بنكي" class="hidden" checked>
                <div class="border border-slate-700 bg-slate-800/40 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center text-slate-300 group-hover:text-white transition">
                            <i class="fa-solid fa-building-columns text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">تحويل بنكي</span>
                                <span class="bg-red-500/20 text-red-400 text-[10px] font-black px-1.5 py-0.5 rounded border border-red-500/20">-15%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">CIH, Barid, Attijari, Pocket, CashPlus Virement</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-bank" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="PayPal" class="hidden">
                <div class="border border-slate-700 bg-slate-800/40 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center text-[#00457C] group-hover:text-white transition">
                            <i class="fa-brands fa-paypal text-xl"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">PayPal</span>
                                <span class="bg-red-500/20 text-red-400 text-[10px] font-black px-1.5 py-0.5 rounded border border-red-500/20">-10%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">دفع إلكتروني آمن وسريع</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-paypal" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="Binance Pay" class="hidden">
                <div class="border border-slate-700 bg-slate-800/40 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center text-[#F3BA2F] group-hover:text-white transition">
                            <i class="fa-brands fa-bitcoin text-xl"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">Binance Pay</span>
                                <span class="bg-red-500/20 text-red-400 text-[10px] font-black px-1.5 py-0.5 rounded border border-red-500/20">-10%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">USDT / Crypto</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-binance" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="وكالة كاش بليس" class="hidden">
                <div class="border border-slate-700 bg-slate-800/40 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center text-yellow-500 group-hover:text-white transition">
                            <i class="fa-solid fa-money-bill-transfer text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">وكالة Cash Plus</span>
                                <span class="bg-red-500/20 text-red-400 text-[10px] font-black px-1.5 py-0.5 rounded border border-red-500/20">-7%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">الإرسال نقداً من أي وكالة</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-cashplus" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="تعبئة إنوي" class="hidden">
                <div class="border border-slate-700 bg-slate-800/40 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center text-purple-400 group-hover:text-white transition">
                            <i class="fa-solid fa-mobile-screen-button text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">تعبئة إنوي (*9)</span>
                                <span class="bg-red-500/20 text-red-400 text-[10px] font-black px-1.5 py-0.5 rounded border border-red-500/20">-5%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">الدفع عبر رموز التعبئة</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-inwi" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="مباشرة عبر الواتساب" class="hidden">
                <div class="border border-slate-700 bg-slate-800/40 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/50 flex items-center justify-center text-green-500 group-hover:text-white transition">
                            <i class="fa-brands fa-whatsapp text-xl"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">تواصل عبر الواتساب</span>
                                <span class="bg-slate-700 text-slate-300 text-[10px] font-bold px-1.5 py-0.5 rounded">0%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">شراء تقليدي بدون تخفيض</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-whatsapp" class="text-sm font-black text-slate-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

        </div>

        <div class="sticky bottom-4 z-50">
            <button id="submitBtn" onclick="processOrder()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition shadow-[0_0_20px_rgba(59,130,246,0.4)] flex justify-center items-center gap-2 text-sm tracking-wide">
                <span>تأكيد ومتابعة الدفع</span>
                <i class="fa-solid fa-arrow-left mt-0.5"></i>
            </button>
        </div>

    </main>

    <script>
        // 1. جلب البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const accTitle = urlParams.get('title');
        const accImg = urlParams.get('img');
        const originalBankPrice = parseFloat(urlParams.get('bank')) || 0;
        const originalInwiPrice = parseFloat(urlParams.get('inwi')) || 0;

        // 2. التحقق وعرض البيانات الأساسية
        if(accTitle) {
            document.getElementById('accTitle').innerText = accTitle;
            document.getElementById('accImg').src = accImg;
            document.getElementById('baseBankPrice').innerText = originalBankPrice + " MAD";
            document.getElementById('baseInwiPrice').innerText = originalInwiPrice + " MAD";
            
            // حساب التخفيضات وعرضها فوراً
            calculateDiscounts();
        } else {
            alert("حدث خطأ! المرجو العودة للمتجر واختيار الحساب من جديد.");
            window.location.href = 'index.html';
        }

        // 3. نظام حساب التخفيضات
        function calculateDiscounts() {
            // البنك كأساس للبيبال وبينانس وكاش بليس والبنك
            const pBank = originalBankPrice;
            // التعبئة كأساس للإنوي
            const pInwi = originalInwiPrice;

            // الحسابات الرياضية (Math.round لإزالة الفواصل)
            const priceBank = Math.round(pBank - (pBank * 0.15));      // -15%
            const pricePayPal = Math.round(pBank - (pBank * 0.10));    // -10%
            const priceBinance = Math.round(pBank - (pBank * 0.10));   // -10%
            const priceCashPlus = Math.round(pBank - (pBank * 0.07));  // -7%
            const priceInwiDiscount = Math.round(pInwi - (pInwi * 0.05)); // -5%
            const priceWhatsapp = pBank;                               // 0%

            // تعبئة الأرقام في الواجهة
            document.getElementById('price-bank').innerText = priceBank + " MAD";
            document.getElementById('price-paypal').innerText = pricePayPal + " MAD";
            document.getElementById('price-binance').innerText = priceBinance + " MAD";
            document.getElementById('price-cashplus').innerText = priceCashPlus + " MAD";
            document.getElementById('price-inwi').innerText = priceInwiDiscount + " MAD";
            document.getElementById('price-whatsapp').innerText = priceWhatsapp + " MAD";
        }

        // 4. معالجة وتوجيه الطلب
        function processOrder() {
            const methodElement = document.querySelector('input[name="payment_method"]:checked');
            if(!methodElement) return;
            
            const method = methodElement.value;
            let finalPriceToPay = 0;

            // جلب السعر النهائي حسب الاختيار لإرساله لصفحة التأكيد أو الواتساب
            if(method === "تحويل بنكي") finalPriceToPay = Math.round(originalBankPrice * 0.85);
            else if(method === "PayPal") finalPriceToPay = Math.round(originalBankPrice * 0.90);
            else if(method === "Binance Pay") finalPriceToPay = Math.round(originalBankPrice * 0.90);
            else if(method === "وكالة كاش بليس") finalPriceToPay = Math.round(originalBankPrice * 0.93);
            else if(method === "تعبئة إنوي") finalPriceToPay = Math.round(originalInwiPrice * 0.95);
            else finalPriceToPay = originalBankPrice; // واتساب

            // تأثير الزر أثناء التحميل
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري تجهيز الطلب...';
            btn.classList.replace('bg-blue-600', 'bg-slate-700');
            btn.classList.remove('shadow-[0_0_20px_rgba(59,130,246,0.4)]');
            
            setTimeout(() => {
                // التوجيه الذكي
                if(method === "تحويل بنكي" || method === "وكالة كاش بليس") {
                    // يذهب لصفحة البنوك التي برمجناها (confirm.html)
                    window.location.href = `confirm.html?price=${finalPriceToPay}&method=${encodeURIComponent(method)}`;
                } else {
                    // يذهب للواتساب لباقي الطرق
                    const msg = `سلام EPEC STORE،\n\n🛒 *الحساب:* ${accTitle}\n💳 *طريقة الدفع:* ${method}\n💰 *الثمن بعد التخفيض:* ${finalPriceToPay} درهم\n\nواش متوفر باش ندفع دابا؟`;
                    window.location.href = `https://wa.me/212663011890?text=${encodeURIComponent(msg)}`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
