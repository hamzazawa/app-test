                    
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - EPEC STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        /* تصميم اختيار الدفع التفاعلي */
        .payment-label input:checked + div { 
            border-color: #3b82f6; 
            background-color: rgba(59, 130, 246, 0.1); 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }
        .payment-label input:checked + div .check-circle { 
            background-color: #3b82f6;
            border-color: #3b82f6;
        }
        .payment-label input:checked + div .check-circle i { opacity: 1; }
        
        /* إخفاء شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <header class="bg-[#1e293b] border-b border-slate-800 py-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 max-w-md flex items-center justify-between">
            <h1 class="text-sm font-black text-white flex items-center gap-2">
                <i class="fa-solid fa-lock text-green-400"></i> إتمام الشراء الآمن
            </h1>
            <a href="index.html" class="text-slate-400 hover:text-white text-xs font-bold transition flex items-center gap-1 bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                <i class="fa-solid fa-arrow-right"></i> إلغاء
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-md flex-grow">
        
        <button onclick="alert('سيتم إضافة الفيديو قريباً!')" class="w-full mb-6 bg-gradient-to-r from-slate-800 to-slate-800 border border-slate-700 hover:border-blue-500/50 rounded-xl p-3 flex items-center justify-between transition group shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 group-hover:bg-red-500 group-hover:text-white transition shadow-inner">
                    <i class="fa-solid fa-play ml-0.5 text-xs"></i>
                </div>
                <span class="text-sm font-bold text-slate-200">فيديو تعليمي: كيف تشتري من موقعنا؟</span>
            </div>
            <i class="fa-solid fa-chevron-left text-slate-500 text-xs"></i>
        </button>

        <div class="bg-slate-800/80 border border-slate-700 rounded-2xl overflow-hidden mb-6 shadow-lg">
            <div class="relative h-48 w-full bg-slate-900 border-b border-slate-700">
                <img id="accImg" src="" alt="Account Image" class="w-full h-full object-cover">
            </div>
            
            <div class="p-4">
                <h2 id="accTitle" class="text-sm font-bold text-white leading-relaxed mb-4 text-center">جاري التحميل...</h2>
                
                <div class="flex items-center justify-between bg-slate-900 rounded-xl p-3 border border-slate-700/50 mb-4">
                    <div class="text-center w-1/2 border-l border-slate-700">
                        <p class="text-[10px] text-slate-400 mb-0.5">سعر البنك</p>
                        <p id="baseBankPrice" class="font-bold text-sm text-slate-200">0 MAD</p>
                    </div>
                    <div class="text-center w-1/2">
                        <p class="text-[10px] text-slate-400 mb-0.5">سعر التعبئة</p>
                        <p id="baseInwiPrice" class="font-bold text-sm text-slate-200">0 MAD</p>
                    </div>
                </div>

                <div class="flex justify-center">
                    <span class="inline-flex items-center gap-1.5 bg-blue-600/10 border border-blue-500/30 text-blue-400 text-[10px] font-black px-4 py-1.5 rounded-full shadow-sm">
                        <i class="fa-solid fa-link text-xs"></i> مربوط بـ KONAMI ID
                    </span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-xl mb-6 shadow-sm">
            <div class="bg-emerald-500/20 w-10 h-10 rounded-full flex items-center justify-center text-emerald-400 shrink-0">
                <i class="fa-solid fa-stopwatch text-xl"></i>
            </div>
            <div>
                <p class="text-xs font-bold text-emerald-400 mb-0.5">التسليم في 10 دقائق كحد أقصى</p>
                <p class="text-[10px] text-slate-400">مع دعم فني كامل أثناء وبعد عملية الشراء</p>
            </div>
        </div>

        <div class="flex items-center justify-between mb-4 px-1">
            <h3 class="text-sm font-black text-slate-200">اختر طريقة الدفع</h3>
        </div>
        
        <div class="space-y-3 mb-8">
            
            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="تحويل بنكي" class="hidden" checked>
                <div class="border border-slate-700 bg-slate-800/60 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/80 flex items-center justify-center text-slate-300 group-hover:text-white transition shadow-inner">
                            <i class="fa-solid fa-building-columns text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">تحويل بنكي</span>
                                <span class="bg-yellow-500/10 text-yellow-500 text-[10px] font-black px-1.5 py-0.5 rounded border border-yellow-500/20">-7%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">CIH, Barid, Attijari, Pocket, CashPlus</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-bank" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="Binance Pay" class="hidden">
                <div class="border border-slate-700 bg-slate-800/60 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/80 flex items-center justify-center text-[#F3BA2F] group-hover:text-white transition shadow-inner">
                            <i class="fa-brands fa-bitcoin text-xl"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">Binance Pay</span>
                                <span class="bg-yellow-500/10 text-yellow-500 text-[10px] font-black px-1.5 py-0.5 rounded border border-yellow-500/20">-4%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">USDT (1$ = 10 MAD)</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-binance" class="text-sm font-black text-blue-400 dir-ltr">0.00 $</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="وكالة كاش بليس" class="hidden">
                <div class="border border-slate-700 bg-slate-800/60 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/80 flex items-center justify-center text-yellow-500 group-hover:text-white transition shadow-inner">
                            <i class="fa-solid fa-money-bill-transfer text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">وكالة Cash Plus</span>
                                <span class="bg-yellow-500/10 text-yellow-500 text-[10px] font-black px-1.5 py-0.5 rounded border border-yellow-500/20">-4%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">الإرسال نقداً من أي وكالة</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-cashplus" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="تعبئة إنوي" class="hidden">
                <div class="border border-slate-700 bg-slate-800/60 rounded-xl p-3.5 transition flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/80 flex items-center justify-center text-purple-400 group-hover:text-white transition shadow-inner">
                            <i class="fa-solid fa-mobile-screen-button text-lg"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">تعبئة إنوي (*9)</span>
                                <span class="bg-yellow-500/10 text-yellow-500 text-[10px] font-black px-1.5 py-0.5 rounded border border-yellow-500/20">-4%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">الدفع عبر رموز التعبئة</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end">
                        <div id="price-inwi" class="text-sm font-black text-blue-400">0 MAD</div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="مباشرة عبر الواتساب" class="hidden">
                <div class="border border-slate-700 bg-slate-800/60 rounded-xl p-3.5 transition flex items-center justify-between group items-stretch">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-700/80 flex items-center justify-center text-green-400 group-hover:text-white transition shadow-inner shrink-0">
                            <i class="fa-brands fa-whatsapp text-xl"></i>
                        </div>
                        <div class="flex flex-col justify-center">
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-white">الشراء عبر واتساب</span>
                                <span class="bg-slate-700 text-slate-300 text-[10px] font-bold px-1.5 py-0.5 rounded border border-slate-600">0%</span>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-1">تواصل مباشر لتأكيد الطلب</div>
                        </div>
                    </div>
                    <div class="text-left flex flex-col items-end justify-center">
                        <div id="price-whatsapp" class="text-[10px] font-black text-slate-300 text-left dir-ltr leading-tight"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-600 flex items-center justify-center mt-1 check-circle transition-colors shrink-0">
                            <i class="fa-solid fa-check text-[8px] text-white opacity-0 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            </label>

        </div>

        <div class="sticky bottom-4 z-50 mt-4">
            <button id="submitBtn" onclick="processOrder()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition shadow-[0_4px_15px_rgba(59,130,246,0.3)] flex justify-center items-center gap-2 text-sm tracking-wide">
                <span>تأكيد ومتابعة الدفع</span>
                <i class="fa-solid fa-arrow-left mt-0.5"></i>
            </button>
        </div>

    </main>

    <script>
        // جلب البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const accTitle = urlParams.get('title');
        const accImg = urlParams.get('img');
        const originalBankPrice = parseFloat(urlParams.get('bank')) || 0;
        const originalInwiPrice = parseFloat(urlParams.get('inwi')) || 0;

        // التحقق وتعبئة الواجهة
        if(accTitle) {
            document.getElementById('accTitle').innerText = accTitle;
            document.getElementById('accImg').src = accImg;
            document.getElementById('baseBankPrice').innerText = originalBankPrice + " MAD";
            document.getElementById('baseInwiPrice').innerText = originalInwiPrice + " MAD";
            
            calculateDiscounts();
        } else {
            alert("حدث خطأ! المرجو العودة للمتجر واختيار الحساب من جديد.");
            window.location.href = 'index.html';
        }

        // الحسابات الرياضية للتخفيضات وتحويل الدولار
        function calculateDiscounts() {
            const pBank = originalBankPrice;
            const pInwi = originalInwiPrice;

            // التخفيضات المطلوبة: بنك 7%، بينانس 4%، كاش بليس 4%، إنوي 4%
            const priceBank = Math.round(pBank - (pBank * 0.07));      
            const priceBinanceMad = pBank - (pBank * 0.04);   
            const priceBinanceUSD = (priceBinanceMad / 10).toFixed(2); // تحويل للدولار 10 دراهم = 1 دولار
            const priceCashPlus = Math.round(pBank - (pBank * 0.04));  
            const priceInwiDiscount = Math.round(pInwi - (pInwi * 0.04)); 

            // تعبئة الأرقام
            document.getElementById('price-bank').innerText = priceBank + " MAD";
            document.getElementById('price-binance').innerText = priceBinanceUSD + " $";
            document.getElementById('price-cashplus').innerText = priceCashPlus + " MAD";
            document.getElementById('price-inwi').innerText = priceInwiDiscount + " MAD";
            
            // الواتساب (بدون تخفيض - يعرض السعرين)
            document.getElementById('price-whatsapp').innerHTML = `${pBank} MAD (بنك)<br>${pInwi} MAD (تعبئة)`;
        }

        // التوجيه عند الضغط على زر الشراء
        function processOrder() {
            const methodElement = document.querySelector('input[name="payment_method"]:checked');
            if(!methodElement) return;
            
            const method = methodElement.value;
            let finalPriceToPay = "";

            if(method === "تحويل بنكي") {
                finalPriceToPay = Math.round(originalBankPrice * 0.93) + " درهم";
            } else if(method === "Binance Pay") {
                let pMad = originalBankPrice * 0.96;
                finalPriceToPay = (pMad / 10).toFixed(2) + " دولار (USDT)";
            } else if(method === "وكالة كاش بليس") {
                finalPriceToPay = Math.round(originalBankPrice * 0.96) + " درهم";
            } else if(method === "تعبئة إنوي") {
                finalPriceToPay = Math.round(originalInwiPrice * 0.96) + " درهم تعبئة";
            } else {
                finalPriceToPay = `${originalBankPrice} درهم (بنك) / ${originalInwiPrice} درهم (تعبئة)`;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري تجهيز الطلب...';
            btn.classList.replace('bg-blue-600', 'bg-slate-700');
            
            setTimeout(() => {
                if(method === "تحويل بنكي" || method === "وكالة كاش بليس") {
                    // إرسال الرقم الصافي للصفحة الموالية
                    let numPrice = method === "وكالة كاش بليس" ? Math.round(originalBankPrice * 0.96) : Math.round(originalBankPrice * 0.93);
                    window.location.href = `confirm.html?price=${numPrice}&method=${encodeURIComponent(method)}`;
                } else {
                    const msg = `سلام EPEC STORE،\n\n🛒 *الحساب:* ${accTitle}\n💳 *طريقة الدفع:* ${method}\n💰 *الثمن:* ${finalPriceToPay}\n\nواش متوفر باش ندفع دابا؟`;
                    window.location.href = `https://wa.me/212663011890?text=${encodeURIComponent(msg)}`;
                }
            }, 800);
        }
    </script>
</body>
</html>
