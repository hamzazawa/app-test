<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - EPEC STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .payment-option input:checked + div { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="antialiased">

    <header class="bg-[#1e293b] border-b border-slate-800 py-4">
        <div class="container mx-auto px-4 flex items-center justify-between">
            <h1 class="text-lg font-bold text-white"><i class="fa-solid fa-lock text-green-400 mr-2"></i> الدفع الآمن</h1>
            <a href="index.html" class="text-slate-400 hover:text-white text-sm"><i class="fa-solid fa-arrow-left ml-1"></i> رجوع للمتجر</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl flex flex-col md:flex-row gap-8">
        
        <div class="w-full md:w-2/3">
            <h2 class="text-xl font-bold mb-6 border-b border-slate-800 pb-2">اختر طريقة الدفع</h2>
            
            <div class="space-y-4">
                
                <label class="payment-option cursor-pointer block">
                    <input type="radio" name="payment_method" value="البطاقة البنكية (تسليم فوري)" class="hidden" checked onchange="toggleCardForm(true)">
                    <div class="border border-slate-700 rounded-xl p-4 transition">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-3">
                                <i class="fa-regular fa-credit-card text-2xl text-blue-400"></i>
                                <span class="font-bold text-lg">البطاقة البنكية</span>
                            </div>
                            <span class="bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded border border-green-500/30">تسليم فوري VIP</span>
                        </div>
                        
                        <div id="cardForm" class="mt-4 pt-4 border-t border-slate-700">
                            <div class="mb-3">
                                <label class="block text-xs text-slate-400 mb-1">رقم البطاقة</label>
                                <input type="text" placeholder="0000 0000 0000 0000" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-blue-500 font-mono text-sm dir-ltr">
                            </div>
                            <div class="flex gap-3">
                                <div class="flex-1">
                                    <label class="block text-xs text-slate-400 mb-1">تاريخ الانتهاء</label>
                                    <input type="text" placeholder="MM/YY" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-blue-500 font-mono text-sm text-center">
                                </div>
                                <div class="flex-1">
                                    <label class="block text-xs text-slate-400 mb-1">CVV</label>
                                    <input type="text" placeholder="123" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white outline-none focus:border-blue-500 font-mono text-sm text-center">
                                </div>
                            </div>
                            <p class="text-[10px] text-slate-500 mt-2 text-center"><i class="fa-solid fa-shield-halved"></i> بياناتك مشفرة ومحمية ببروتوكول SSL</p>
                        </div>
                    </div>
                </label>

                <label class="payment-option cursor-pointer block">
                    <input type="radio" name="payment_method" value="كاش بليس (تسليم فوري)" class="hidden" onchange="toggleCardForm(false)">
                    <div class="border border-slate-700 rounded-xl p-4 transition">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-money-bill-transfer text-2xl text-yellow-500"></i>
                                <span class="font-bold text-lg">كاش بليس Cash Plus</span>
                            </div>
                            <span class="bg-green-500/20 text-green-400 text-xs font-bold px-2 py-1 rounded border border-green-500/30">تسليم فوري VIP</span>
                        </div>
                    </div>
                </label>

                <label class="payment-option cursor-pointer block">
                    <input type="radio" name="payment_method" value="تحويل بنكي (CIH / Attijari)" class="hidden" onchange="toggleCardForm(false)">
                    <div class="border border-slate-700 rounded-xl p-4 transition">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-building-columns text-2xl text-slate-400"></i>
                            <span class="font-bold text-lg text-slate-300">تحويل بنكي (CIH / التجاري)</span>
                        </div>
                    </div>
                </label>

                <label class="payment-option cursor-pointer block">
                    <input type="radio" name="payment_method" value="تعبئة إنوي (*9)" class="hidden" onchange="toggleCardForm(false)">
                    <div class="border border-slate-700 rounded-xl p-4 transition">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-mobile-screen-button text-2xl text-purple-400"></i>
                            <span class="font-bold text-lg text-slate-300">تعبئة إنوي (*9)</span>
                        </div>
                    </div>
                </label>

            </div>
        </div>

        <div class="w-full md:w-1/3">
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 sticky top-20">
                <h2 class="text-lg font-bold mb-4 border-b border-slate-700 pb-2">ملخص الطلب</h2>
                
                <img id="accImg" src="" class="w-full h-32 object-cover rounded-lg mb-3 border border-slate-700">
                <p id="accTitle" class="text-sm text-slate-300 font-bold mb-4 leading-relaxed"></p>
                
                <div class="space-y-2 mb-6">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">سعر الحساب:</span>
                        <span id="priceDisplay" class="font-bold text-white">0 MAD</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">رسوم الخدمة:</span>
                        <span class="font-bold text-green-400">مجاناً</span>
                    </div>
                </div>

                <div class="border-t border-slate-700 pt-4 mb-6">
                    <div class="flex justify-between items-center">
                        <span class="font-bold">المجموع الكلي:</span>
                        <span id="totalDisplay" class="font-black text-xl text-blue-400">0 MAD</span>
                    </div>
                </div>

                <button onclick="processOrder()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition flex justify-center items-center gap-2 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-check"></i> تأكيد الدفع
                </button>
            </div>
        </div>

    </main>

    <script>
        // جلب البيانات من الرابط (URL Parameters)
        const urlParams = new URLSearchParams(window.location.search);
        const accTitle = urlParams.get('title');
        const accImg = urlParams.get('img');
        const bankPrice = urlParams.get('bank');
        const inwiPrice = urlParams.get('inwi');

        // عرض البيانات في الصفحة
        if(accTitle) {
            document.getElementById('accTitle').innerText = accTitle;
            document.getElementById('accImg').src = accImg;
            updatePrices('البطاقة البنكية (تسليم فوري)'); // السعر الافتراضي
        } else {
            // إذا دخل الصفحة بدون اختيار حساب
            window.location.href = 'index.html';
        }

        // التحكم في إظهار فورم البطاقة البنكية الوهمي وتحديث السعر
        function toggleCardForm(show) {
            document.getElementById('cardForm').style.display = show ? 'block' : 'none';
            const selectedMethod = document.querySelector('input[name="payment_method"]:checked').value;
            updatePrices(selectedMethod);
        }

        // تحديث السعر حسب طريقة الدفع
        function updatePrices(method) {
            let currentPrice = bankPrice;
            if(method.includes("إنوي")) {
                currentPrice = inwiPrice;
            }
            document.getElementById('priceDisplay').innerText = currentPrice + " MAD";
            document.getElementById('totalDisplay').innerText = currentPrice + " MAD";
        }

        // إرسال الطلب (هنا يتم تحويل الزبون للواتساب بعد إيهامه بالدفع)
        function processOrder() {
            const method = document.querySelector('input[name="payment_method"]:checked').value;
            let finalPrice = method.includes("إنوي") ? inwiPrice : bankPrice;
            
            // تغيير شكل الزر لإعطاء إحساس بالمعالجة
            const btn = document.querySelector('button[onclick="processOrder()"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري المعالجة...';
            btn.classList.replace('bg-blue-600', 'bg-slate-600');
            
            // محاكاة وقت الدفع ثم التوجيه للواتساب
            setTimeout(() => {
                const msg = `سلام، بغيت نأكد الطلب ديالي:\n\n🛒 *الحساب:* ${accTitle}\n💳 *طريقة الدفع:* ${method}\n💰 *الثمن:* ${finalPrice} درهم\n\nواش متوفر دابا باش ندفع؟`;
                window.location.href = `https://wa.me/212663011890?text=${encodeURIComponent(msg)}`;
            }, 1500);
        }
    </script>
</body>
</html>
