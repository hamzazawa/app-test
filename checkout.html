<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب - EPEC STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        /* تصميم اختيار الدفع */
        .payment-label input:checked + div { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.08); }
        .payment-label input:checked + div .check-icon { display: block; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <header class="bg-[#1e293b] border-b border-slate-800 py-3">
        <div class="container mx-auto px-4 max-w-lg flex items-center justify-between">
            <h1 class="text-sm font-bold text-white"><i class="fa-solid fa-shield-check text-blue-500 mr-2"></i> إتمام الشراء الآمن</h1>
            <a href="index.html" class="text-slate-400 hover:text-white text-xs"><i class="fa-solid fa-arrow-left ml-1"></i> رجوع</a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-lg flex-grow">
        
        <div class="bg-[#1e293b] border border-slate-800 rounded-xl p-4 mb-6 shadow-md">
            <div class="flex gap-4 items-center border-b border-slate-700 pb-4 mb-3">
                <img id="accImg" src="" alt="Account" class="w-20 h-20 object-cover rounded-lg border border-slate-600">
                <div class="flex-1">
                    <h2 id="accTitle" class="text-xs font-bold text-slate-200 leading-relaxed mb-2">جاري التحميل...</h2>
                    <div class="flex items-center justify-between">
                        <span class="text-[11px] text-slate-400">السعر الإجمالي:</span>
                        <span id="priceDisplay" class="font-bold text-blue-400 text-base">0 MAD</span>
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center text-[11px] text-slate-400">
                <span><i class="fa-solid fa-bolt text-yellow-400"></i> تسليم فوري</span>
                <span>الرسوم: <span class="text-green-400">0 درهم</span></span>
            </div>
        </div>

        <h3 class="text-xs font-bold text-slate-400 mb-3 px-1">اختر طريقة الدفع:</h3>
        
        <div class="space-y-2.5 mb-8">
            
            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="PayPal" class="hidden" checked onchange="updatePrices(false)">
                <div class="border border-slate-700 rounded-lg p-3 flex items-center justify-between transition hover:border-slate-500">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-paypal text-lg text-[#00457C] bg-white rounded-sm px-1"></i>
                        <div>
                            <div class="text-sm font-bold text-slate-200">PayPal</div>
                            <div class="text-[10px] text-slate-500">الدفع عبر بيبال (متاح قريباً)</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-circle-check text-blue-500 hidden check-icon text-sm"></i>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="Binance Pay" class="hidden" onchange="updatePrices(false)">
                <div class="border border-slate-700 rounded-lg p-3 flex items-center justify-between transition hover:border-slate-500">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-bitcoin text-lg text-[#F3BA2F]"></i>
                        <div>
                            <div class="text-sm font-bold text-slate-200">Binance Pay (Crypto)</div>
                            <div class="text-[10px] text-slate-500">USDT / BTC (متاح قريباً)</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-circle-check text-blue-500 hidden check-icon text-sm"></i>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="كاش بليس" class="hidden" onchange="updatePrices(false)">
                <div class="border border-slate-700 rounded-lg p-3 flex items-center justify-between transition hover:border-slate-500">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-money-bill-transfer text-lg text-yellow-500"></i>
                        <div>
                            <div class="text-sm font-bold text-slate-200">وكالة كاش بليس (Cash Plus)</div>
                            <div class="text-[10px] text-slate-500">إرسال الأموال من أي وكالة</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-circle-check text-blue-500 hidden check-icon text-sm"></i>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="تحويل بنكي" class="hidden" onchange="updatePrices(false)">
                <div class="border border-slate-700 rounded-lg p-3 flex items-center justify-between transition hover:border-slate-500">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-building-columns text-lg text-slate-400"></i>
                        <div>
                            <div class="text-sm font-bold text-slate-200">تحويل بنكي</div>
                            <div class="text-[10px] text-slate-500">CIH Bank / التجاري وفا بنك</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-circle-check text-blue-500 hidden check-icon text-sm"></i>
                </div>
            </label>

            <label class="payment-label cursor-pointer block">
                <input type="radio" name="payment_method" value="تعبئة إنوي" class="hidden" onchange="updatePrices(true)">
                <div class="border border-slate-700 rounded-lg p-3 flex items-center justify-between transition hover:border-slate-500">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-mobile-screen-button text-lg text-purple-400"></i>
                        <div>
                            <div class="text-sm font-bold text-slate-200">تعبئة إنوي (*9)</div>
                            <div class="text-[10px] text-slate-500">السعر يختلف عند الدفع بالتعبئة</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-circle-check text-blue-500 hidden check-icon text-sm"></i>
                </div>
            </label>
        </div>

        <button id="submitBtn" onclick="processOrder()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition flex justify-center items-center gap-2 text-sm shadow-md">
            متابعة الدفع <i class="fa-solid fa-arrow-left text-lg"></i>
        </button>

    </main>

    <script>
        // جلب البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const accTitle = urlParams.get('title');
        const accImg = urlParams.get('img');
        const bankPrice = urlParams.get('bank');
        const inwiPrice = urlParams.get('inwi');

        // التحقق من وجود بيانات، وإلا إظهار رسالة خطأ
        if(accTitle) {
            document.getElementById('accTitle').innerText = accTitle;
            document.getElementById('accImg').src = accImg;
            updatePrices(false); // السعر الافتراضي
        } else {
            document.getElementById('accTitle').innerText = "حدث خطأ: المرجو العودة واختيار حساب!";
            document.getElementById('accImg').src = "https://via.placeholder.com/150?text=Error";
        }

        // تحديث السعر بناءً على طريقة الدفع
        function updatePrices(isInwi) {
            if(!bankPrice || !inwiPrice) return;
            const currentPrice = isInwi ? inwiPrice : bankPrice;
            document.getElementById('priceDisplay').innerText = currentPrice + " MAD";
        }

        // معالجة الطلب وتوجيه الزبون
        function processOrder() {
            if(!accTitle) {
                alert("المرجو العودة للصفحة الرئيسية واختيار حساب أولاً.");
                window.location.href = 'index.html';
                return;
            }

            const methodElement = document.querySelector('input[name="payment_method"]:checked');
            if(!methodElement) return;
            
            const method = methodElement.value;
            const isInwi = method.includes("إنوي");
            const finalPrice = isInwi ? inwiPrice : bankPrice;
            
            // تغيير شكل الزر
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحويل...';
            btn.classList.replace('bg-blue-600', 'bg-slate-700');
            
            setTimeout(() => {
                // إذا اختار تحويل بنكي أو كاش بليس يذهب لصفحة تأكيد الدفع
                if(method.includes("تحويل بنكي") || method.includes("كاش بليس")) {
                    window.location.href = `confirm.html?price=${finalPrice}&method=${encodeURIComponent(method)}`;
                } else {
                    // إذا اختار شيء آخر (مثل إنوي أو بيبال) يذهب للواتساب
                    const msg = `سلام، بغيت نأكد الطلب ديالي:\n\n🛒 *الحساب:* ${accTitle}\n💳 *طريقة الدفع:* ${method}\n💰 *الثمن:* ${finalPrice} درهم\n\nواش متوفر باش ندفع دابا؟`;
                    window.location.href = `https://wa.me/212663011890?text=${encodeURIComponent(msg)}`;
                }
            }, 800);
        }
    </script>
</body>
</html>
